[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  # Node 24 + pnpm 11.3.0 = mismo entorno que la PC local (pnpm 11 exige Node >= 22.13)
  NODE_VERSION = "24"
  # pnpm 9 no entiende pnpm-workspace.yaml con solo allowBuilds (exige "packages")
  PNPM_VERSION = "11.3.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
